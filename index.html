<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Smart TV Player Dev</title>
    <style>
      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .screen {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      img, video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./dist/app.js"></script>
  </body>
</html>
